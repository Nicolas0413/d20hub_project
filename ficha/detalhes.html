<!DOCTYPE html>
    <html lang="pt-BR">
    <head>
    <script src="js/fichacarregar.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha RPG</title>
    <link rel="icon" type="image/x-icon" href="img/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="js/pegartema.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>

<body>
<div class="sheet" >
<div style="margin-bottom: 10px; text-align: center;">
  <a class="btn btn-outline-primary" href="ficha.html">Ficha</a>
  <a class="btn btn-outline-primary" href="pericias.html">Pericias</a>
  <a class="btn btn-outline-primary" href="habilidades.html">Habilidades</a>
  <a class="btn btn-outline-primary" href="inventario.html">Inventário</a>
  <a class="btn btn-outline-primary" href="detalhes.html">Detalhes</a>
</div>

<div class="top" style="margin-bottom: 10px;">
  <div class="image-wrapper">
    <img src="img/Aguiar.jpg" data-save="pfp" class="photo" id="charImage">
    <input type="file" id="imageInput" accept="image/*" hidden>
  </div>

  <div class="info">
    <div class="name-row">
      <input class="editable name" disabled placeholder="Nome do personagem" data-save="nome">

      <button class="edit-icon" onclick="toggleEdit()" id="editBtn">
        <i class="bi bi-pencil-square"></i>
      </button>
    </div>

    <div class="level">
      <span title="Nex">Nex</span><input class="editable" disabled placeholder="40" data-save="Nex" style="width: 30px;">% &nbsp&nbsp&nbsp&nbsp
      Classe:<input class="editable" disabled style="width:80px; font-size: 14px; text-align: left;" placeholder="Combatente" data-save="classe">
        
    </div>
    <div class="level">
      Trilha:<input class="editable" disabled style="width:80px; font-size: 14px; text-align: left;" placeholder="Aniquilador" data-save="Trilha">
      Origem:<input class="editable" disabled style="width:89px; font-size: 14px; text-align: left;" placeholder="Acadêmico" data-save="origem">
    </div>
  </div>
</div>
<div>

    <h2>Anotações:</h2>
    <textarea class="editable" disabled placeholder="Anotoções gerais sobre o personagem e missões" data-save="anotacoes"></textarea>
    <h2>Aparência:</h2>
    <textarea class="editable" disabled placeholder="Descrição físca do personagem como: genêro, idade, altura etc." data-save="aparencia"></textarea>
    <h2>Histórico:</h2>
    <textarea class="editable" disabled placeholder="História do personagem (de onde veio, qual seu objetivo etc.)" data-save="historico"></textarea>

</div>
<div style="text-align: center;">
  <div class="image-wrapper">
    <img src="img/Aguiar_corpo.png" class="image" id="detailImage" data-save="detailImage">
    <input type="file" id="detailImageInput" accept="image/*" hidden>
  </div>
</div>
</div>



</body>

<script src="js/storage.js"></script>
<script src="js/edit.js"></script>
<script src="js/tema.js"></script>
</html>
