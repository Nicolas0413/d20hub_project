<!DOCTYPE html>
    <html lang="pt-BR">
    <head>
    <script>
       // Obtém o ID da ficha da URL
    function getFichaId() {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('id') || 'default';
    }

    const fichaId = getFichaId();
    window.STORAGE_KEY = "fichaRPG_" + fichaId; // Define a chave dinâmica para storage.js

    // Atualiza links para incluir ?id=
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('a[href]').forEach(a => {
            const href = a.getAttribute('href');
            if (href && href.endsWith('.html') && !href.includes('?')) {
                a.href = href + '?id=' + fichaId;
            }
        });
    });
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha RPG</title>
    <link rel="icon" type="image/x-icon" href="img/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script>
      const tema = localStorage.getItem("tema") || "style1";

      if (tema === "style2") {
        document.write('<link rel="stylesheet" href="css/style2.css">');
      } else {
        document.write('<link rel="stylesheet" href="css/style1.css">');
      }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>

<body>
<div class="sheet" >
<div style="margin-bottom: 10px; text-align: center;">
  <a class="btn btn-outline-primary" href="ficha.html">Ficha</a>
  <a class="btn btn-outline-primary" href="pericias.html">Pericias</a>
  <a class="btn btn-outline-primary" href="habilidades.html">Habilidades</a>
  <a class="btn btn-outline-primary" href="inventario.html">Inventário</a>
  <a class="btn btn-outline-primary" href="detalhes.html">Detalhes</a>
</div>
<div class="top">
  <div class="image-wrapper">
    <img src="img/Aguiar.jpg" data-save="pfp" class="photo" id="charImage">
    <input type="file" id="imageInput" accept="image/*" hidden>
  </div>

  <div class="info">
    <div class="name-row">
      <input class="editable name" disabled placeholder="Nome do personagem" data-save="nome">

      <button class="edit-icon" onclick="toggleEdit()" id="editBtn">
        <i class="bi bi-pencil-square"></i>
      </button>
    </div>

    <div class="level">
      <span title="Nex">Nex</span><input class="editable" disabled placeholder="40" data-save="Nex" style="width: 30px;">% &nbsp&nbsp&nbsp&nbsp
      Classe:<input class="editable" disabled style="width:80px; font-size: 14px; text-align: left;" placeholder="Combatente" data-save="classe">
        
    </div>
    <div class="level">
      Trilha:<input class="editable" disabled style="width:80px; font-size: 14px; text-align: left;" placeholder="Aniquilador" data-save="Trilha">
      Origem:<input class="editable" disabled style="width:89px; font-size: 14px; text-align: left;" placeholder="Acadêmico" data-save="origem">
    </div>
  </div>
</div>


<div class="attributes">
  <div class="attr" title="Força">FOR<input class="editable" value="1" disabled type="number" data-save="FOR"></div>
  <div class="attr" title="Agilidade">AGI<input class="editable" value="1" disabled type="number" data-save="AGI"></div>
  <div class="attr" title="intelecto">INT<input class="editable" value="1" disabled type="number" data-save="INT"></div>
  <div class="attr" title="Preseça">PRE<input class="editable" value="1" disabled type="number" data-save="PRE"></div>
  <div class="attr" title="Vigor">VIG<input class="editable" value="1" disabled type="number" data-save="VIG"></div>
</div>


<div class="section">
  <div class="label">VIDA</div>
  <div class="stat">
    <input class="editable" disabled id="pvAtual" type="number" value="63" oninput="updateBar('pv')" data-save="pvAtual" style="width:60px;">
    /
    <input class="editable" disabled id="pvMax" type="number" value="63" oninput="updateBar('pv')" data-save="pvMax" style="width: 60px; text-align: right;">
  </div>
  <div class="bar-bg"><div class="bar" id="pvBar"></div></div>
</div>

<div class="section">
  <div class="label">DETERMINAÇÃO</div>
  <div class="stat">
    <input class="editable" disabled id="detAtual" type="number" value="34" oninput="updateBar('det')" data-save="detAtual" style="width:60px">
    /
    <input class="editable" disabled id="detMax" type="number" value="34" oninput="updateBar('det')" data-save="detMax" style="width:60px; text-align: right;">
  </div>
  <div class="bar-bg"><div class="bar" id="detBar"></div></div>
</div>

<div class="section defenses">
  <div>
    <div class="label">DEFESA</div>
    <input class="editable" disabled type="number" value="17" data-save="defesa">
  </div>
  <div>
    <div class="label">ESQUIVA</div>
    <input class="editable" disabled type="number" value="17" data-save="esquiva">
  </div>
  <div>
    <div class="label">BLOQUEIO</div>
    <input class="editable" disabled type="number" value="10" data-save="bloqueio">
  </div>
</div>


<div class="section">
  <div>
    <table width="100%">
      <td class="list" width="111.68">Ataque</td>
      <td class="list" width="111.68">Dano</td>
      <td class="listend" width="111.68">Crítico</td>
    </table>  
  </div>
  <div class="attacks" id="attacks"></div>
  <button class="edit-btn" onclick="addAttack()">Adicionar ataque</button>
</div>

<button class="btn btn-success export" onclick="exportFichaCSV()">
  <i class="bi bi-download"></i> Exportar Ficha
</button>

<input type="file" id="importCSV" accept=".csv" hidden>
<button class="btn btn-primary import" onclick="document.getElementById('importCSV').click()">
  <i class="bi bi-upload"></i> Importar Ficha
</button>

<a href="../index.html" class="ama"><button class="btn" id="retornar">Retornar</button></a>

<div class="dice-control">


  <input id="diceQtd" value="1" min="1" style="width:20px;">
  

  <select class="dice" id="diceType">
    <option value="4">d4</option>
    <option value="6">d6</option>
    <option value="8" selected>d8</option>
    <option value="10">d10</option>
    <option value="12">d12</option>
    <option value="20">d20</option>
    <option value="100">d100</option>
  </select>


  +<input id="diceBonus"  value="0" style="width:35px;" title="Bônus">


  <button class="dice" onclick="rollFromInputs()"> 
    <i class="bi bi-dice-6"></i> 
  </button>



</div>

<div id="dice-result" class="dice-result"></div>
</div>

</body>

<script src="js/storage.js"></script>
<script src="js/edit.js"></script>
<script src="js/addatk.js"></script>
<script src="js/roll.js"></script>
<script src="js/updatebar.js"></script>
<script src="js/exportCSV.js"></script>
<script src="js/tema.js"></script>

</html>
