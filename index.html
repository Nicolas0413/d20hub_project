<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D20HUB</title>
    
</head>
<body>
    <div class="toolbar">
        <h2 id="contadorFichas">Fichas: 0/15</h2>

        <div class="botoesToolbar">
            <!--<button class="novaficha" id="retornar" onclick="retornar()">Retornar</button>-->
            <button class="novaficha" id="limparFichas">Limpar fichas</button>
            <button class="novaficha" id="criarFicha">Criar ficha</button>
        </div>
    </div>
    
    <div id="fichasContainer"></div>

    <script>
        let fichas = 0;
        let nextFichaId = Number(localStorage.getItem('nextFichaId') || 0);

        function salvarNextFichaId() {
        localStorage.setItem('nextFichaId', nextFichaId);
        }

        let fichasData = JSON.parse(localStorage.getItem('fichasData') || '[]');
        const fichasContainer = document.getElementById("fichasContainer");
        const contador = document.getElementById("contadorFichas");

        function salvarFichas() {
        localStorage.setItem('fichasData', JSON.stringify(fichasData));
    }

        function criarDivFicha(id, nome = '') {
        const div = document.createElement("div");
        div.classList.add("divfichas");
        div.id = id;

        const input = document.createElement("input");
        input.type = "text";
        input.placeholder = "Nome da ficha";
        input.classList.add("inputficha");
        input.value = nome; // Carrega o nome salvo
        div.appendChild(input);

        input.addEventListener('input', () => {
        const nomeAtual = input.value.trim();
        const fichaIndex = fichasData.findIndex(f => f.id === id);
        if (fichaIndex !== -1) {
            fichasData[fichaIndex].nome = nomeAtual;
            salvarFichas();
    }
});

        const botoesDiv = document.createElement("div");
        botoesDiv.classList.add("botoesDiv");
        
        const acessarBtn = document.createElement("button");
        acessarBtn.textContent = "Acessar";
        acessarBtn.classList.add("acessarBtn");
        acessarBtn.addEventListener("click", () => {
            const nomeAtual = input.value.trim();
            if (nomeAtual) {
                // Atualiza o nome no array e salva
                const fichaIndex = fichasData.findIndex(f => f.id === id);
                if (fichaIndex !== -1) {
                    fichasData[fichaIndex].nome = nomeAtual;
                    salvarFichas();
                }
                window.location.href = `ficha/ficha.html?id=${id}`;
            } else {
                alert("Por favor, digite um nome para a ficha.");
            }
        });
        div.appendChild(acessarBtn);

        const excluirBtn = document.createElement("button");
        excluirBtn.textContent = "Excluir";
        excluirBtn.classList.add("excluirBtn");
        excluirBtn.addEventListener("click", () => {
            fichasData = fichasData.filter(f => f.id !== id);
            salvarFichas();
            localStorage.removeItem('fichaRPG_' + id);
            fichasContainer.removeChild(div);
            fichas -= 1;
            contador.innerText = `Fichas: ${fichas}/15`;
            });
        div.appendChild(excluirBtn);

        botoesDiv.appendChild(acessarBtn);
        botoesDiv.appendChild(excluirBtn);
        div.appendChild(botoesDiv);

        fichasContainer.appendChild(div);
    }

    // Carrega fichas salvas ao iniciar a página
    function carregarFichas() {
        fichasData.forEach(ficha => {
            criarDivFicha(ficha.id, ficha.nome);
        });
        fichas = fichasData.length;
        contador.innerText = `Fichas: ${fichas}/15`;
    }

    // Chama o carregamento ao iniciar
    carregarFichas();

    document.getElementById("criarFicha").addEventListener("click", (event) => {
        if (fichas >= 15) {
            alert("Limite de fichas atingido!");
            return;
        }

        nextFichaId += 1;
        salvarNextFichaId()

        fichas += 1;
        contador.innerText = `Fichas: ${fichas}/15`;
        
        const novaFicha = { id: `ficha${nextFichaId}`, nome: '' };
        fichasData.push(novaFicha);
        salvarFichas(); // Salva imediatamente

        criarDivFicha(novaFicha.id, novaFicha.nome);
    });

    document.getElementById("limparFichas").addEventListener("click", () => {
        if (confirm("Tem certeza que deseja limpar todas as fichas?")) {
            localStorage.clear();
            fichasData = [];
            fichas = 0;
            contador.innerText = `Fichas: ${fichas}/15`;
            fichasContainer.innerHTML = '';
        }
});

    /*function retornar() {
        confirm("Deseja retornar ao menu? Certifique-se de que abriu o programa.py para retornar, caso contrário o menu não executará adequadamente.") 
            window.location.href = "tela_de_login/templates/menu.html";
    }*/
</script>
</body>
</html>
